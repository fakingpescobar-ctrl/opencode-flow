<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="50%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="16" fill="url(#bg)"/>

  <!-- Waveform bars (decorative) -->
  <g opacity="0.15">
    <rect x="30" y="35" width="4" height="50" rx="2" fill="#e94560"/>
    <rect x="38" y="25" width="4" height="70" rx="2" fill="#e94560"/>
    <rect x="46" y="30" width="4" height="60" rx="2" fill="#e94560"/>
    <rect x="54" y="20" width="4" height="80" rx="2" fill="#533483"/>
    <rect x="62" y="35" width="4" height="50" rx="2" fill="#533483"/>
    <rect x="70" y="28" width="4" height="64" rx="2" fill="#533483"/>
  </g>

  <!-- Flow arrow -->
  <g transform="translate(88, 45)">
    <line x1="0" y1="15" x2="24" y2="15" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="24,10 32,15 24,20" fill="#e94560"/>
  </g>

  <!-- Mic icon -->
  <g transform="translate(110, 42)" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round">
    <rect x="6" y="0" width="8" height="14" rx="4"/>
    <path d="M2 14 C2 20 18 20 18 14"/>
    <line x1="10" y1="18" x2="10" y2="28"/>
  </g>

  <!-- Speaker icon -->
  <g transform="translate(165, 42)" fill="none" stroke="#533483" stroke-width="2" stroke-linecap="round">
    <rect x="0" y="6" width="6" height="12" rx="1"/>
    <polygon points="6,6 14,0 14,24 6,18"/>
    <path d="M18 8 C22 12 22 16 18 20" stroke-width="1.5"/>
    <path d="M21 5 C27 12 27 19 21 26" stroke-width="1.5"/>
  </g>

  <!-- Title -->
  <text x="210" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffffff">opencode</text>
  <text x="210" y="76" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="url(#accent)">flow</text>

  <!-- Tagline -->
  <text x="210" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#8892b0" letter-spacing="1">TTS · VOICE INPUT · YM CONTROL</text>
</svg>
